name: Probe Ellena Fathom key (re-check)
on: { workflow_dispatch: {} }
jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - run: |
          set -eu
          KEY="2lBQXbsYVXyTv3ADqIOJw.qbNwvPtcsiQOg3ThcFSX2QDPCpvkscDYnCFi3aQVVoA"
          echo "--- /meetings recent ---"
          curl -sS -w "\nHTTP %{http_code}\n" -H "X-Api-Key: $KEY" \
            "https://api.fathom.ai/external/v1/meetings?created_after=2026-04-15T00:00:00Z&limit=20&include_summary=false" 2>&1
