name: Fire backfill for any missed meetings

# One-click catch-up. Sweeps the most recent external meetings across
# all 3 Fathom accounts (up to 50 per account ≈ several months of
# history per seat), cross-references against Notion's Partner Meeting
# Library, and fires repository_dispatch for each meeting that isn't
# already there. Notion dedup makes this safe to run as often as you
# like — already-processed meetings are skipped.
#
# Trigger paths:
#   - workflow_dispatch (UI / `gh workflow run`)
#   - Cloudflare Worker `/backfill?token=...` (bookmark / Slack button)

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [fathom_manual_backfill]

permissions:
  contents: write   # needed to fire repository_dispatch from within this run

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      DATA_SOURCE_ID: 8115f0ee-00c8-488a-a05b-57726af0acf4
      CHANNEL: C0APW8DSA4R
    steps:
      - name: Identify gaps and fire dispatches
        env:
          FATHOM_WILL_KEY: ${{ secrets.FATHOM_WILL_KEY }}
          FATHOM_CAITLIN_KEY: ${{ secrets.FATHOM_CAITLIN_KEY }}
          FATHOM_ELLENA_KEY: ${{ secrets.FATHOM_ELLENA_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu

          # No created_after filter — pull the most recent 50 external
          # meetings per account (Fathom returns newest first). Notion
          # dedup catches anything already processed, so the actual
          # work scales with the *gap*, not the window size.
          fetch_account() {
            local account=$1 key=$2
            if [ -z "$key" ]; then
              echo "[]"
              return
            fi
            curl -sS -H "X-Api-Key: $key" \
              "https://api.fathom.ai/external/v1/meetings?limit=50&include_summary=false" \
              | jq --arg account "$account" \
                '[.items[]?
                  | select(.calendar_invitees_domains_type == "one_or_more_external")
                  | {account: $account,
                     rid: (.recording_id|tostring),
                     title: .title,
                     share_url: .share_url,
                     start: .scheduled_start_time}]'
          }

          ALL=$(jq -n \
            --argjson w "$(fetch_account will    "$FATHOM_WILL_KEY")" \
            --argjson c "$(fetch_account caitlin "$FATHOM_CAITLIN_KEY")" \
            --argjson e "$(fetch_account ellena  "$FATHOM_ELLENA_KEY")" \
            '$w + $c + $e')

          echo "Fathom returned $(echo "$ALL" | jq 'length') external meetings across all 3 accounts"
          echo "$ALL" | jq '.'

          # Paginate Notion to collect every Meeting ID currently in the
          # data source. Notion's page_size max is 100; we read up to 5
          # pages = 500 entries, plenty for any realistic backlog.
          SEEN="[]"
          CURSOR=""
          for page in 1 2 3 4 5; do
            if [ -z "$CURSOR" ]; then
              BODY='{"page_size":100}'
            else
              BODY=$(jq -nc --arg c "$CURSOR" '{page_size:100, start_cursor:$c}')
            fi
            NOTION_RESP=$(curl -sS -X POST \
              -H "Authorization: Bearer $NOTION_TOKEN" \
              -H "Notion-Version: 2025-09-03" \
              -H "Content-Type: application/json" \
              -d "$BODY" \
              "https://api.notion.com/v1/data_sources/${DATA_SOURCE_ID}/query")

            PAGE_IDS=$(echo "$NOTION_RESP" \
              | jq '[.results[]
                     | (.properties["Meeting ID"].rich_text[0].plain_text // "")
                     | select(length > 0)]')
            SEEN=$(jq -n --argjson a "$SEEN" --argjson b "$PAGE_IDS" '$a + $b')

            HAS_MORE=$(echo "$NOTION_RESP" | jq -r '.has_more // false')
            if [ "$HAS_MORE" != "true" ]; then
              break
            fi
            CURSOR=$(echo "$NOTION_RESP" | jq -r '.next_cursor // ""')
            if [ -z "$CURSOR" ]; then
              break
            fi
          done
          echo "Notion data source has $(echo "$SEEN" | jq 'length') Meeting IDs recorded"

          MISSING=$(echo "$ALL" \
            | jq --argjson seen "$SEEN" \
              '[.[] | select((.rid as $r | $seen | index($r)) | not)]')
          COUNT=$(echo "$MISSING" | jq 'length')

          echo "Missing from Notion: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            curl -sS -X POST \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$(jq -nc --arg ch "$CHANNEL" \
                '{channel:$ch, text:":white_check_mark: Manual backfill: nothing to do — every recent Fathom meeting is already in Notion."}')" \
              https://slack.com/api/chat.postMessage > /dev/null
            exit 0
          fi

          # Fire each missing meeting via repository_dispatch.
          # Identical mechanism to the live Worker → GH path.
          SUMMARY_LINES=""
          for i in $(seq 0 $((COUNT - 1))); do
            ACCOUNT=$(echo "$MISSING" | jq -r ".[$i].account")
            RID=$(echo "$MISSING"     | jq -r ".[$i].rid")
            TITLE=$(echo "$MISSING"   | jq -r ".[$i].title")
            SHARE=$(echo "$MISSING"   | jq -r ".[$i].share_url")
            START=$(echo "$MISSING"   | jq -r ".[$i].start")

            echo "→ Firing $ACCOUNT / $RID — $TITLE"
            gh api "repos/${GITHUB_REPOSITORY}/dispatches" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -f event_type=fathom_meeting_ended \
              -F "client_payload[account]=$ACCOUNT" \
              -F "client_payload[recording_id]=$RID" \
              -F "client_payload[title]=$TITLE" \
              -F "client_payload[share_url]=$SHARE" \
              -F "client_payload[scheduled_start_time]=$START" \
              -F "client_payload[calendar_invitees_domains_type]=one_or_more_external"

            SUMMARY_LINES+="• ${TITLE} (${ACCOUNT}, RID \`${RID}\`)\n"
            sleep 4
          done

          MSG=":zap: *Manual backfill* — fired ${COUNT} missed meetings. They'll appear in this channel over the next ~15 min.\n${SUMMARY_LINES}"

          curl -sS -X POST \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -nc --arg ch "$CHANNEL" --arg msg "$MSG" '{channel:$ch, text:$msg}')" \
            https://slack.com/api/chat.postMessage > /dev/null
