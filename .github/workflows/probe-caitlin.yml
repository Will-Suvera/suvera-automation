name: Probe — list Caitlin meetings (temp)

on:
  workflow_dispatch: {}

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: List Caitlin external meetings since 2026-04-15
        env:
          KEY: ${{ secrets.FATHOM_CAITLIN_KEY }}
        run: |
          set -eu
          curl -sS -o /tmp/caitlin.json -w "HTTP %{http_code}\n" \
            -H "X-Api-Key: ${KEY}" \
            "https://api.fathom.ai/external/v1/meetings?created_after=2026-04-15T00:00:00Z&limit=50&include_summary=false"
          jq '[.items[]? | select(.calendar_invitees_domains_type == "one_or_more_external") | {rid: .recording_id, title: .title, start: .scheduled_start_time, share: .share_url}]' /tmp/caitlin.json
