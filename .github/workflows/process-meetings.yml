name: Process Fathom meetings

# Fires every 5 min (GitHub Actions cron minimum). Each run simply invokes the
# existing claude.ai scheduled trigger, which does the real work: poll all 3
# Fathom accounts for new meetings in the last 2 hours, dedupe against Notion,
# and run the full /process-meetings pipeline for any new ones.
#
# No pipeline logic lives here — that's embedded in the trigger prompt so this
# workflow stays ~15 lines forever.

on:
  schedule:
    # Every 5 min during UK working hours (07:00–18:59 UTC, roughly 08:00–19:59 BST) Mon–Fri.
    # Keeps subscription usage bounded: ~144 runs/day Mon–Fri vs 288/day 24/7.
    - cron: '*/5 7-18 * * 1-5'
  workflow_dispatch: {}

concurrency:
  group: process-meetings
  cancel-in-progress: false

jobs:
  fire-trigger:
    name: Run scheduled trigger
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Fire the Claude Code routine
        env:
          CLAUDE_API_TOKEN: ${{ secrets.CLAUDE_API_TOKEN }}
          ROUTINE_ID: ${{ secrets.TRIGGER_ID }}
        run: |
          set -eu
          if [ -z "${CLAUDE_API_TOKEN:-}" ] || [ -z "${ROUTINE_ID:-}" ]; then
            echo "::error::Missing CLAUDE_API_TOKEN or TRIGGER_ID secret."
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLAUDE_API_TOKEN}" \
            -H "anthropic-beta: experimental-cc-routine-2026-04-01" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"Fired by github-actions-cron run ${GITHUB_RUN_ID}\"}" \
            "https://api.anthropic.com/v1/claude_code/routines/${ROUTINE_ID}/fire")
          echo "HTTP ${http_code}"
          echo "--- response ---"
          cat /tmp/resp.json || true
          echo
          if [ "${http_code}" -ge 400 ]; then
            echo "::error::routines/fire failed with HTTP ${http_code}"
            exit 1
          fi
