name: Process Fathom meetings

# Fires every 5 min (GitHub Actions cron minimum). Each run simply invokes the
# existing claude.ai scheduled trigger, which does the real work: poll all 3
# Fathom accounts for new meetings in the last 2 hours, dedupe against Notion,
# and run the full /process-meetings pipeline for any new ones.
#
# No pipeline logic lives here — that's embedded in the trigger prompt so this
# workflow stays ~15 lines forever.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: process-meetings
  cancel-in-progress: false

jobs:
  fire-trigger:
    name: Run scheduled trigger
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: POST /v1/code/triggers/{id}/run
        env:
          CLAUDE_API_TOKEN: ${{ secrets.CLAUDE_API_TOKEN }}
          TRIGGER_ID: ${{ secrets.TRIGGER_ID }}
        run: |
          set -eu
          if [ -z "${CLAUDE_API_TOKEN:-}" ] || [ -z "${TRIGGER_ID:-}" ]; then
            echo "::error::Missing CLAUDE_API_TOKEN or TRIGGER_ID secret."
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${CLAUDE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"source\":\"github-actions-cron\",\"run_id\":\"${GITHUB_RUN_ID}\"}" \
            "https://api.claude.ai/v1/code/triggers/${TRIGGER_ID}/run")
          echo "HTTP ${http_code}"
          echo "--- response ---"
          cat /tmp/resp.json || true
          echo
          if [ "${http_code}" -ge 400 ]; then
            echo "::error::trigger.run failed with HTTP ${http_code}"
            exit 1
          fi
