name: Update pinned backfill button (one-shot)

# Updates an existing pinned button message in-place via chat.update.
# Use when the button's description text is stale but the URL is fine
# (re-posting would lose the pin).

on:
  workflow_dispatch:
    inputs:
      message_ts:
        description: "ts of the message to update (e.g. 1778859623.872379)"
        required: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: chat.update the pinned button
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          BACKFILL_WORKER_URL: ${{ secrets.BACKFILL_WORKER_URL }}
          BACKFILL_TOKEN: ${{ secrets.BACKFILL_TOKEN }}
          TS: ${{ inputs.message_ts }}
        run: |
          set -eu

          URL="${BACKFILL_WORKER_URL%/}/backfill?token=${BACKFILL_TOKEN}"

          PAYLOAD=$(jq -nc \
            --arg ch "C0APW8DSA4R" \
            --arg ts "$TS" \
            --arg url "$URL" '
            {
              channel: $ch,
              ts: $ts,
              text: "Manual backfill button",
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: ":zap: *Manual backfill*\nClick to sweep the most recent ~50 Fathom meetings per account and fire any that haven'\''t been processed yet. Idempotent — already-in-Notion meetings are skipped via dedup, so safe to spam. Result posts as a single status line in this channel ~15s after you click."
                  }
                },
                {
                  type: "actions",
                  elements: [
                    {
                      type: "button",
                      text: { type: "plain_text", text: "Fire backfill", emoji: true },
                      style: "primary",
                      url: $url
                    }
                  ]
                }
              ]
            }')

          RESP=$(curl -sS -X POST \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD" \
            https://slack.com/api/chat.update)

          echo "$RESP" | jq '{ok, ts, error}'
          OK=$(echo "$RESP" | jq -r '.ok')
          if [ "$OK" != "true" ]; then
            echo "::error::chat.update failed"
            exit 1
          fi
