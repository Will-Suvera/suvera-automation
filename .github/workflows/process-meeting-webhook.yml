name: Process meeting (webhook)

# Fires per-meeting when the Fathom webhook relay (Cloudflare Worker) calls
# GitHub's repository_dispatch API. No polling, no cron — runs exactly once
# per meeting, seconds after Fathom finishes processing the recording.
#
# Billing: uses CLAUDE_CODE_OAUTH_TOKEN (from `claude setup-token`), which
# spends against the Max subscription, NOT pay-per-use API credits.

on:
  repository_dispatch:
    types: [fathom_meeting_ended]
  workflow_dispatch:
    inputs:
      account:
        description: "will | caitlin | ellena"
        required: true
        default: "will"
      recording_id:
        description: "Fathom recording_id"
        required: true
      title:
        description: "Meeting title"
        required: true
      share_url:
        description: "Fathom share URL slug"
        required: true
      scheduled_start_time:
        description: "ISO8601 start time"
        required: true
      calendar_invitees_domains_type:
        description: "one_or_more_external | all_internal"
        required: false
        default: "one_or_more_external"

# claude-code-action needs id-token: write for its OIDC handshake.
permissions:
  contents: read
  id-token: write

concurrency:
  # One concurrent job per meeting. Different meetings run in parallel.
  group: meeting-${{ github.event.client_payload.recording_id || github.event.inputs.recording_id }}
  cancel-in-progress: false

jobs:
  process:
    name: ${{ github.event.client_payload.account || github.event.inputs.account }} / ${{ github.event.client_payload.recording_id || github.event.inputs.recording_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Install ffmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Run Claude Code pipeline
        uses: anthropics/claude-code-action@v1
        env:
          RID: ${{ github.event.client_payload.recording_id || github.event.inputs.recording_id }}
          ACCOUNT: ${{ github.event.client_payload.account || github.event.inputs.account }}
          TITLE: ${{ github.event.client_payload.title || github.event.inputs.title }}
          SHARE_URL: ${{ github.event.client_payload.share_url || github.event.inputs.share_url }}
          SCHEDULED_START: ${{ github.event.client_payload.scheduled_start_time || github.event.inputs.scheduled_start_time }}
          INVITEES_DOMAINS: ${{ github.event.client_payload.calendar_invitees_domains_type || github.event.inputs.calendar_invitees_domains_type }}
          FATHOM_WILL_KEY: ${{ secrets.FATHOM_WILL_KEY }}
          FATHOM_CAITLIN_KEY: ${{ secrets.FATHOM_CAITLIN_KEY }}
          FATHOM_ELLENA_KEY: ${{ secrets.FATHOM_ELLENA_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Bash,Read,Write,Edit,Grep,Glob
            --max-turns 120
          prompt: |
            You are processing ONE specific Fathom meeting that just ended. All
            metadata is in environment variables. Do NOT poll Fathom for other
            meetings. Do NOT try to dedupe against Notion — the webhook fires
            exactly once per meeting, so duplicate protection is unnecessary.
            If any step fails fatally, post a :rotating_light: alert to Slack
            C0APW8DSA4R before exiting.

            ## Inputs (from env)
            - $RID — recording_id
            - $ACCOUNT — "will", "caitlin", or "ellena" (which Fathom account owns it)
            - $TITLE — meeting title
            - $SHARE_URL — Full Fathom share URL (e.g. https://fathom.video/share/SLUG).
              Watch links: append "?timestamp=SECS". m3u8 probe: append "/video.m3u8".
              Do NOT prepend "https://fathom.video/share/" again — it's already in there.
            - $SCHEDULED_START — ISO timestamp
            - $INVITEES_DOMAINS — "all_internal" or "one_or_more_external"

            ## Scope filter (check first, bail if not a fit)
            1. Must be external: $INVITEES_DOMAINS == "one_or_more_external". If not, exit quietly.
            2. Must mention Planner: fetch the transcript (step 1 below) and
               count case-insensitive "planner" occurrences. If 0, exit
               quietly and post NOTHING to Slack. (≥1 mention qualifies —
               we'd rather process a borderline call than miss it.)

            ## Credentials
            Use the right Fathom key for the account:
              - account=will    → $FATHOM_WILL_KEY
              - account=caitlin → $FATHOM_CAITLIN_KEY
              - account=ellena  → $FATHOM_ELLENA_KEY

            Slack token: $SLACK_BOT_TOKEN. Channel: C0APW8DSA4R only.
            Notion integration token: $NOTION_TOKEN. Use Notion REST API
            (https://api.notion.com/v1/...) with headers
            "Authorization: Bearer $NOTION_TOKEN" and
            "Notion-Version: 2025-09-03" (required — older versions don't
            expose data_sources).

            Partner Meeting Library data_source id:
              8115f0ee-00c8-488a-a05b-57726af0acf4
            (In the 2025-09-03 API this is a "data_source", not a
            "database". See Step 3 for the correct parent shape.)

            ## Step 1: Transcript
            curl -s -H "X-Api-Key: $KEY" \
              "https://api.fathom.ai/external/v1/recordings/$RID/transcript" \
              > /tmp/tx.json
            Timestamps are HH:MM:SS — convert to seconds for Watch links.

            ## Step 2: Analyse (full format, no TLDR)
            - Problem Statement — 4-5 sentences about practice size, system
              (EMIS/SystmOne), geography, current recall setup.
            - Pain Points — 5 to 8 bullets, each with a verbatim quote AND a
              Watch link (${SHARE_URL}?timestamp=SECS) AND the current workaround.
            - Current Alternatives — tools they use today, what's broken.
            - Dream Solution — MOST IMPORTANT. 2-3 verbatim quotes with Watch
              links, plus the implicit wishes behind them.
            - Ideal Features — 5 to 10 rows: feature name, urgency
              (High/Medium/Low), Planner status (Live / In build / Roadmap / Gap).
            - Key Quotes — EXACTLY 10 quotes with Watch links, categorised:
              :red_circle: PROBLEM x3, :star: DREAM x3, :fire: REACTION x2,
              :zap: POWERFUL x2.
            - Opportunity Signal — High/Medium/Low with rationale.
            - Product Implications — 5 to 8 actionable bullets.
            - 14 Discovery Questions — 2-3 sentences each.

            ## Step 3: Notion page (REST API) — with dedup

            ### 3a. Check for existing entry first
            POST https://api.notion.com/v1/data_sources/8115f0ee-00c8-488a-a05b-57726af0acf4/query
            body: { "filter": { "property": "Meeting ID", "rich_text": { "equals": "$RID" } } }

            If results array is non-empty:
              - Set $NOTION_URL = results[0].url
              - Set $NOTION_PAGE_ID = results[0].id
              - Skip 3b entirely (do NOT create a duplicate page)
              - Log "Notion page already exists for RID=$RID — reusing URL"
              - Jump to Step 4 (still post the new-format Slack message)

            If results array is empty, continue to 3b.

            ### 3b. Create the page
            POST https://api.notion.com/v1/pages
            Parent: { "type":"data_source_id", "data_source_id":"8115f0ee-00c8-488a-a05b-57726af0acf4" }
            Icon: { "type":"emoji", "emoji":"🏥" }
            Before creating, GET /v1/data_sources/8115f0ee-00c8-488a-a05b-57726af0acf4
            to retrieve the live property schema — property names and types
            (select option values, multi_select option values, date format)
            must match exactly or the create 400s.
            Properties:
              Meeting (title) — "Practice — Lead Person (date)"
              Meeting ID (rich_text) — "$RID"
              Fathom Recording (url) — "$SHARE_URL"
              Opportunity Signal (select) — High/Medium/Low
              Main Theme (multi_select) — ONE of: Data Accuracy, Automation,
                SMS and Comms, Onboarding, SystmOne, Recall Workflow, QOF,
                Booking Links, Churn Risk, Upsell, Feature Request, Competitive Intel
              Status (select) — "New"
              Date (date) — { start: "$SCHEDULED_START", is_datetime: true } if the
                property name is "Date" and supports datetime; otherwise adjust.
            Children: full markdown analysis rendered as Notion blocks (heading_2
            for sections, bulleted_list_item for bullets, quote for pull-quotes,
            paragraph for prose). Convert quote Watch links to inline links via
            the rich_text "link" field.

            Capture the returned page id + url ($NOTION_URL below).

            ## Step 4: Slack main post (8-block card)
            Channel C0APW8DSA4R. ONE chat.postMessage. Write JSON to
            /tmp/slack_main.json, POST via curl -d @file to
            https://slack.com/api/chat.postMessage with header
            "Authorization: Bearer $SLACK_BOT_TOKEN" and
            "Content-Type: application/json; charset=utf-8".

            Use EXACTLY this block layout (8 blocks, in order). All
            section text is mrkdwn. Capture the response "ts" — Steps 5
            and 6 will reply in-thread.

            Signal colour key (use the right circle emoji for the signal):
              :large_green_circle: High   |   :large_yellow_circle: Medium   |   :red_circle: Low

            Feature urgency colour key (separate from signal):
              :red_circle: High urgency | :large_yellow_circle: Medium | :large_green_circle: Low

            Source label: account=will → "Will's Fathom"
                          account=caitlin → "Caitlin's Fathom"
                          account=ellena  → "Ellena's Fathom"

            Block 1 — header
              type: "header"
              text: ":hospital: {Practice} — {Lead Person} ({Their Role})"
              (Slack header blocks don't render emoji shortcodes; if you want
              the hospital glyph in the header, use the literal 🏥 character
              in the plain_text. For body blocks below, keep :emoji: shortcodes.)

            Block 2 — section with 4 fields
              type: "section"
              fields: [
                { type:"mrkdwn", text:"*Practice*\n{Practice (Region)}" },
                { type:"mrkdwn", text:"*Date*\n{e.g. 21 April 2026 — human-readable}" },
                { type:"mrkdwn", text:"*Signal*\n{circle emoji} {High|Medium|Low}" },
                { type:"mrkdwn", text:"*Themes*\n{Theme1 · Theme2 · Theme3}" }
              ]

            Block 3 — section, attendees + source
              type: "section"
              text: { type:"mrkdwn",
                text:"*Attendees:* {Names with roles in parens} | *Source:* {Source label}" }

            Block 4 — section, one-line practice profile
              type: "section"
              text: { type:"mrkdwn",
                text:"{patient count} patients · {contract count} contracts · {clinical system note, e.g. ~90% SystmOne region (Norfolk & Waveney + all Suffolk)}" }
              If a fact is genuinely unknown from the transcript, omit it —
              don't say "unknown". Keep this to ONE line, dot-separated.

            Block 5 — section, Key Takeaways
              type: "section"
              text: { type:"mrkdwn", text:"*Key Takeaways*\n1. {takeaway one}\n2. {takeaway two}\n3. {takeaway three}" }
              Three numbered takeaways. Each 1-2 sentences. Focus on
              signal-relevance (why this prospect matters, not generic facts).

            Block 6 — section, Dream Solution (2 verbatim quotes)
              type: "section"
              text: { type:"mrkdwn",
                text:":speech_balloon: *Dream Solution*\n> \"{verbatim quote 1}\"\n> \"{verbatim quote 2}\"" }
              Quotes must be verbatim from transcript. Quote-block markdown
              (`> `) per line. No attribution needed inside this block.

            Block 7 — section, Ideal Features (5 bullets)
              type: "section"
              text: { type:"mrkdwn",
                text:"*Ideal Features*\n• {urgency-emoji} {Feature name} — {High|Medium|Low} | {Live|In build|Roadmap|Gap}\n• ..." }
              Exactly 5 bullets. Order by urgency emoji (red first, then yellow,
              then green). Optional parenthetical detail after the feature name
              when it sharpens meaning (e.g. "PSA 6m, re-recall 3m post-med change").

            Block 8 — actions, two buttons
              type: "actions"
              elements: [
                { type:"button",
                  text:{ type:"plain_text", text:"Open in Notion" },
                  url:"$NOTION_URL",
                  style:"primary" },
                { type:"button",
                  text:{ type:"plain_text", text:"Watch on Fathom" },
                  url:"$SHARE_URL" }
              ]

            Also set the top-level "text" field on the chat.postMessage call to
            the practice name (used as Slack notification preview). If the
            Slack post fails non-2xx, log the body and exit non-zero.

            Capture the "ts" from the response (call it $MAIN_TS) — Steps 5
            and 6 reply in-thread.

            ## Step 5: Thread reply — 10 key quotes
            POST chat.postMessage to channel C0APW8DSA4R with
            thread_ts=$MAIN_TS. ONE message containing all 10 quotes grouped
            by emoji category. Format:

              :red_circle: *Problems*
              > "{quote 1}" — {Speaker}, <$SHARE_URL?timestamp=SECS|Watch>
              > "{quote 2}" — {Speaker}, <$SHARE_URL?timestamp=SECS|Watch>
              > "{quote 3}" — {Speaker}, <$SHARE_URL?timestamp=SECS|Watch>

              :star: *Dream*
              > "..." — ...

              :fire: *Reaction*
              > "..." — ...

              :zap: *Powerful*
              > "..." — ...

            Categories and counts: :red_circle: PROBLEM × 3, :star: DREAM × 3,
            :fire: REACTION × 2, :zap: POWERFUL × 2 (total = 10). Each quote
            verbatim from transcript. Watch link timestamp is the speaker's
            start-of-line in seconds. mrkdwn Slack-link format
            <URL|label> — do not use markdown [label](URL) — Slack ignores it.

            ## Step 6: Write clips manifest (do NOT run ffmpeg or upload)

            You only need to SELECT the clips and write them to
            /tmp/clips.json. A deterministic bash step after this one
            does the ffmpeg cuts and Slack uploads — that step is far
            more reliable than asking you to orchestrate dozens of
            curl/ffmpeg invocations.

            Pick 5 to 10 clips under STRICT tier criteria. Quantity is
            flexible — fewer high-quality clips beat more mediocre ones.
            At least 5, no more than 10. Priority order:

              TIER 1 — praise: VERY HIGH explicit enthusiasm. "Wow",
                "this is amazing", "I love that", "exactly what we
                need", "if we do want to go ahead". EXCLUDE lukewarm
                politeness ("yeah nice", filler "brilliant"). Must
                read as visceral, not polite.

              TIER 2 — feature: Direct capability requests. "Can it
                do X?", "does it support Y?", "I wish it did Z".
                EXCLUDE meta/scheduling questions ("will you cover
                X next?"). Product capability only.

              TIER 3 — problem: Multi-sentence pain with specifics
                (systems, constraints, numbers, workarounds). EXCLUDE
                one-liner gripes. Include at least 1 tier-3 clip.

            Selection ordering rule (from saved feedback): praise
            first, then features, then problems. Density over volume.

            Write the manifest to /tmp/clips.json with this exact schema
            (no comments, valid JSON only):
              {
                "main_ts": "<the ts captured from Step 4>",
                "share_url": "$SHARE_URL",
                "practice": "<practice name, no region>",
                "clips": [
                  { "ts": 65, "speaker": "Dr Smith",
                    "quote": "verbatim quote text",
                    "emoji": ":one:", "tier": "praise" },
                  { "ts": 312, "speaker": "...",
                    "quote": "...",
                    "emoji": ":two:", "tier": "feature" }
                ]
              }

            Field rules:
              - ts: integer seconds (convert from HH:MM:SS).
              - quote: verbatim from transcript. Single line. Strip any
                newlines. Slack will render it italicised inside the
                upload's initial_comment.
              - emoji: :one: :two: :three: :four: :five: (and
                :six:…:ten: if more than 5). Order by where the moment
                occurs in the recording (chronological), even though
                you selected them in praise→feature→problem order.
              - tier: "praise" | "feature" | "problem".

            After writing the file, print exactly:
              MANIFEST_WRITTEN: <n> clips → /tmp/clips.json

            That's your only Step 6 deliverable. Do NOT run ffmpeg.
            Do NOT call Slack files.* APIs. Do NOT probe video.m3u8.
            The next workflow step handles all of that.

            ## Context
            Suvera builds Planner, a QOF recall tool for NHS GP practices and
            PCNs. Partners are GP Practices and PCNs. Internal meetings and
            non-Planner product lines are out of scope.

      - name: Upload video clips from manifest
        if: success()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          set -eu

          MANIFEST=/tmp/clips.json
          CHANNEL="C0APW8DSA4R"

          if [ ! -f "$MANIFEST" ]; then
            echo "CLIP_SUMMARY: no /tmp/clips.json from Claude — skipping clip upload"
            exit 0
          fi

          MAIN_TS=$(jq -r '.main_ts // empty' "$MANIFEST")
          SHARE_URL=$(jq -r '.share_url // empty' "$MANIFEST")
          PRACTICE=$(jq -r '.practice // "this meeting"' "$MANIFEST")
          N=$(jq '.clips | length' "$MANIFEST")

          if [ -z "$MAIN_TS" ] || [ -z "$SHARE_URL" ]; then
            echo "::error::manifest missing main_ts or share_url"
            cat "$MANIFEST"
            exit 1
          fi

          if [ "$N" -lt 1 ]; then
            echo "CLIP_SUMMARY: clips.json had 0 clips — skipping upload"
            exit 0
          fi

          echo "Probing HLS at ${SHARE_URL}/video.m3u8 …"
          HEAD_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -I "${SHARE_URL}/video.m3u8")
          BODY_HEAD=$(curl -s "${SHARE_URL}/video.m3u8" | head -c 7)
          echo "HEAD=${HEAD_STATUS}  BODY=${BODY_HEAD}"

          if [ "$HEAD_STATUS" != "200" ] || [ "${BODY_HEAD:0:7}" != "#EXTM3U" ]; then
            echo "HLS unavailable — posting skip notice to thread"
            SKIP_BODY=$(jq -nc \
              --arg ch "$CHANNEL" --arg ts "$MAIN_TS" \
              --arg text "_Video clips unavailable — HLS endpoint returned HTTP ${HEAD_STATUS}_" \
              '{channel:$ch, thread_ts:$ts, text:$text}')
            curl -sS -X POST \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$SKIP_BODY" \
              https://slack.com/api/chat.postMessage > /dev/null
            echo "CLIP_SUMMARY: uploaded=0, probe_status=${HEAD_STATUS}"
            exit 0
          fi

          UPLOADED=0
          for i in $(seq 0 $((N - 1))); do
            TS=$(jq -r ".clips[$i].ts"      "$MANIFEST")
            SPEAKER=$(jq -r ".clips[$i].speaker" "$MANIFEST")
            QUOTE=$(jq -r ".clips[$i].quote"   "$MANIFEST")
            EMOJI=$(jq -r ".clips[$i].emoji"   "$MANIFEST")
            TIER=$(jq -r ".clips[$i].tier"     "$MANIFEST")

            START=$((TS - 5))
            [ $START -lt 0 ] && START=0

            echo "→ Clip $((i + 1))/${N}: ${SPEAKER} @ ${TS}s (${TIER})"

            rm -f /tmp/c.mp4
            if ! timeout 90 ffmpeg -y -hide_banner -loglevel error \
              -i "${SHARE_URL}/video.m3u8" \
              -ss "$START" -t 20 \
              -c:v libx264 -preset ultrafast -crf 28 \
              -c:a aac -b:a 128k \
              -movflags +faststart /tmp/c.mp4; then
              echo "  ffmpeg failed — skipping"
              continue
            fi

            SIZE=$(stat -c %s /tmp/c.mp4 2>/dev/null || echo 0)
            if [ "$SIZE" -lt 1000 ]; then
              echo "  clip too small (${SIZE} bytes) — skipping"
              continue
            fi

            UL_RESP=$(curl -sS \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -F "filename=clip_$((i + 1)).mp4" \
              -F "length=${SIZE}" \
              "https://slack.com/api/files.getUploadURLExternal")
            UPLOAD_URL=$(echo "$UL_RESP" | jq -r '.upload_url // empty')
            FILE_ID=$(echo "$UL_RESP" | jq -r '.file_id // empty')

            if [ -z "$UPLOAD_URL" ] || [ -z "$FILE_ID" ]; then
              echo "  getUploadURLExternal failed: $UL_RESP"
              continue
            fi

            curl -sS --data-binary @/tmp/c.mp4 "$UPLOAD_URL" > /dev/null

            COMMENT="${EMOJI} _\"${QUOTE}\"_ — ${SPEAKER}"
            TITLE="${SPEAKER} — ${TIER}"
            COMPLETE_BODY=$(jq -nc \
              --arg ch "$CHANNEL" --arg ts "$MAIN_TS" \
              --arg fid "$FILE_ID" --arg title "$TITLE" \
              --arg comment "$COMMENT" \
              '{channel_id:$ch, thread_ts:$ts, initial_comment:$comment,
                files:[{id:$fid, title:$title}]}')

            COMPLETE_RESP=$(curl -sS -X POST \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$COMPLETE_BODY" \
              https://slack.com/api/files.completeUploadExternal)
            OK=$(echo "$COMPLETE_RESP" | jq -r '.ok')
            if [ "$OK" = "true" ]; then
              UPLOADED=$((UPLOADED + 1))
              echo "  uploaded file_id=${FILE_ID}"
            else
              echo "  completeUploadExternal failed: $COMPLETE_RESP"
            fi

            rm -f /tmp/c.mp4
          done

          echo "CLIP_SUMMARY: uploaded=${UPLOADED} of ${N}, probe_status=200"

          if [ "$UPLOADED" -eq 0 ]; then
            ALERT_BODY=$(jq -nc \
              --arg ch "$CHANNEL" --arg ts "$MAIN_TS" \
              --arg text ":rotating_light: ${PRACTICE} clip-upload step produced 0 clips despite HLS being reachable." \
              '{channel:$ch, thread_ts:$ts, text:$text}')
            curl -sS -X POST \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H "Content-Type: application/json; charset=utf-8" \
              -d "$ALERT_BODY" \
              https://slack.com/api/chat.postMessage > /dev/null
          fi
