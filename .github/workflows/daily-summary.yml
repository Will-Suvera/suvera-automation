name: Daily summary

# Posts a concise "what happened today" digest to Slack every weekday at
# 18:30 UTC. Uses Claude Code under CLAUDE_CODE_OAUTH_TOKEN (Max subscription,
# no API billing). Reads today's new Notion Partner Meeting Library pages and
# cross-references themes against the full library for frequency counts.
#
# Output format in Slack: very concise
#   - Calls today: N  (or silent if 0)
#   - Problems described today (each with "cited N× elsewhere" count + links)
#   - Feature requests we don't have today (same)
#
# Subscription-funded, zero API credits consumed.

on:
  schedule:
    # 17:00 UTC daily = 18:00 BST (UK summer) / 17:00 GMT (UK winter).
    # GitHub Actions cron doesn't handle DST — this is "6pm UK" during BST
    # (late March → late October). Revisit in winter if you want 18:00 GMT.
    - cron: '0 17 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: daily-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run summary pipeline
        uses: anthropics/claude-code-action@v1
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools Bash,Read,Write,Edit,Grep,Glob
            --max-turns 50
          prompt: |
            You are posting today's partner-meeting digest to Slack. Scope is
            narrow: ONLY feature requests + gaps (things partners asked for that
            Planner doesn't have yet). No problems section. No preamble. No
            adjectives. Be ruthlessly brief.

            ## Credentials
            - NOTION_TOKEN in $NOTION_TOKEN — Notion REST API with headers:
                Authorization: Bearer $NOTION_TOKEN
                Notion-Version: 2025-09-03
            - SLACK_BOT_TOKEN in $SLACK_BOT_TOKEN
            - Channel: C0APW8DSA4R (ONLY post to this channel)
            - Partner Meeting Library data_source id: 8115f0ee-00c8-488a-a05b-57726af0acf4

            ## Step 1: Find today's meetings
            Today (UTC): $(date -u +%Y-%m-%d).
            Query the data_source for pages with created_time on_or_after today
            (or Date property = today if cleaner). Also fetch the full library
            for cross-reference.

            ## Step 2: Silent exit if zero meetings
            If no Notion pages were created today, post NOTHING and exit 0.
            Will's rule: "leave blank if none".

            ## Step 3: Extract feature requests + gaps from today's pages
            For each of today's pages, fetch content via GET /v1/blocks/{page_id}/children.
            Parse the "Ideal Features" table/section. Keep ONLY entries marked:
              - "Gap" (we don't have it)
              - "Roadmap" (planned, not built)
            Drop entries marked "Live" or "In build". ALSO capture direct
            feature asks in the partner's words from the Pain Points or Key
            Quotes sections — phrased "can it…?", "does it…?", "we'd love…",
            "what about X?". Deduplicate within each meeting.

            ## Step 4: Cross-reference across the full library
            For each feature/gap from today, count how many PREVIOUS historical
            pages mention the same or semantically-equivalent ask. Use semantic
            matching — "appointment splitting by clinic type" and "separate
            appointments for different conditions" are the same. Don't obsess
            over exact counts; aim for roughly right.

            For each, collect 1-2 prior Notion page URLs where the same theme
            came up so we can link in the digest.

            ## Step 5: RANK — most commonly cited elsewhere first
            Sort all today's feature requests + gaps by descending "cited
            elsewhere" count. Ties broken by which was stated most clearly
            by today's partner (your judgment). Do not cap the list — include
            every gap/feature-request from today. If a feature appeared in
            multiple of today's meetings, merge into one bullet.

            ## Step 6: Compose the Slack digest
            Slack blocks:
              1. Header: "📊 Partner-call feature digest — {YYYY-MM-DD}"
              2. Section: "*Calls today:* {N}" (one line)
              3. Section — "*Feature requests & gaps (most cited → least):*"
                 Bulleted list. Each bullet:
                   • *<feature or gap in partner's framing>*
                     cited {M}× previously  (if M=0, write "new ask")
                     <links>prior pages where cited</links>
                     _today by: <partner/practice name>_
              4. Context block: italic links to today's meeting posts (Notion
                 URLs are fine).

            ## Step 7: Post to Slack
            Write JSON to /tmp/slack_digest.json. POST:
              curl -X POST -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json; charset=utf-8" \
                -d @/tmp/slack_digest.json https://slack.com/api/chat.postMessage
            Verify ok:true. Exit non-zero on error.

            ## Tone rules (strict)
            - No preamble ("Today we had…")
            - No adjectives ("insightful", "valuable")
            - No problem section — only features + gaps
            - Partner's framing, not our abstraction
            - Never pad to hit a count
